name: Deploy Backend to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Deploy backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend

          rm -rf .git

          git init
          git branch -M main

          git lfs install

          git add .
          git commit -m "Auto deployment"

          git remote add origin https://oauth2:${HF_TOKEN}@huggingface.co/spaces/Hanish23/agrigptnew

          git push origin main --force